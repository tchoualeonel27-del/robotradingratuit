<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h1>Ajouter produit</h1>

<input id="name" placeholder="Nom"><br>
<input id="price" placeholder="Prix"><br>
<input id="image" placeholder="Lien image"><br>
<input id="description" placeholder="Description"><br>

<button onclick="addProduct()">Ajouter</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx8rLULk1o9TT1SJa7d9O5pHrJHMC_Aos",
  authDomain: "robotrading-e1bfa.firebaseapp.com",
  projectId: "robotrading-e1bfa",
  storageBucket: "robotrading-e1bfa.firebasestorage.app",
  messagingSenderId: "915826841078",
  appId: "1:915826841078:web:4e722f035d5e4f05c6a3d7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addProduct = async function () {
  await addDoc(collection(db, "products"), {
    name: document.getElementById("name").value,
    price: Number(document.getElementById("price").value),
    image: document.getElementById("image").value,
    description: document.getElementById("description").value
  });

  alert("Produit ajouté !");
};
</script>

</body>
</html>
