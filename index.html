<!DOCTYPE html>
<html>
<head>
  <title>Boutique</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    .price {
      color: green;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Nos Produits</h1>
<div id="products"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx8rLULk1o9TT1SJa7d9O5pHrJHMC_Aos",
  authDomain: "robotrading-e1bfa.firebaseapp.com",
  projectId: "robotrading-e1bfa",
  storageBucket: "robotrading-e1bfa.firebasestorage.app",
  messagingSenderId: "915826841078",
  appId: "1:915826841078:web:4e722f035d5e4f05c6a3d7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const productsDiv = document.getElementById("products");

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));
  productsDiv.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    productsDiv.innerHTML += `
      <div class="card">
        <img src="${data.image}" />
        <h3>${data.name}</h3>
        <p>${data.description}</p>
        <div class="price">${data.price} FCFA</div>
      </div>
    `;
  });
}

loadProducts();
</script>

</body>
</html>
