<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Robot Trading</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    .price {
      color: green;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Nos Produits</h1>
<div id="products-container"></div>

<div class="products" id="products"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx8rLULk1o9TT1SJa7d9O5pHrJHMC_Aos",
  authDomain: "robotrading-e1bfa.firebaseapp.com",
  projectId: "robotrading-e1bfa",
  storageBucket: "robotrading-e1bfa.firebasestorage.app",
  messagingSenderId: "915826841078",
  appId: "1:915826841078:web:4e722f035d5e4f05c6a3d7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));
  const container = document.getElementById("products");

  container.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const p = doc.data();

    container.innerHTML += `
      <div class="product">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <div class="price">${p.price} FCFA</div>
      </div>
    `;
  });
}

loadProducts();
</script>
<script type="module">

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ⚠️ IMPORTANT : tu dois avoir un endroit dans ton HTML avec cet id
const container = document.getElementById("products-container");

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    const productHTML = `
      <div class="product-card">
        <img src="${data.image}" />
        <h3>${data.name}</h3>
        <p>${data.description}</p>
        <strong>${data.price} FCFA</strong>
      </div>
    `;

    container.innerHTML += productHTML;
  });
}

loadProducts();
</script>
</body>
</html>
